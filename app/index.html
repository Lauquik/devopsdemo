<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Counter</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --accent: #e74a07;
      --accent-dim: #b5c800;
      --text: #ffffff;
      --muted: #fff9f9;
      --border: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 60px 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      box-shadow: 0 0 80px rgba(232,255,0,0.04), 0 20px 60px rgba(0,0,0,0.6);
    }

    .label {
      font-size: 17px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .count-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 18vw, 160px);
      line-height: 1;
      color: var(--accent);
      letter-spacing: 0.02em;
      text-shadow: 0 0 40px rgba(251, 254, 222, 0.25);
      transition: transform 0.08s cubic-bezier(0.34,1.56,0.64,1), color 0.15s;
      user-select: none;
    }

    .count-display.pop {
      transform: scale(1.12);
      color: #fff;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      cursor: pointer;
      border: none;
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 32px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 0 rgba(232,255,0,0);
    }

    .btn-primary:hover {
      background: #f5ff44;
      box-shadow: 0 0 24px rgba(232,255,0,0.35);
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: none;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      color: var(--text);
      border-color: #444;
      transform: translateY(-1px);
    }

    .btn-reset:active {
      transform: scale(0.96);
    }

    /* ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      background: rgba(0,0,0,0.18);
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .history {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="card">
  <span class="label">Click Counter</span>

  <div class="count-display" id="count">0</div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="incrementBtn" onclick="increment()">+ Increment</button>
    <button class="btn btn-reset" onclick="reset()">Reset</button>
  </div>

  <span class="history" id="history">No clicks yet</span>
</div>

<script>
  let count = 0;

  function increment() {
    count++;
    updateDisplay();
    triggerPop();
    updateHistory();
    createRipple(event);
  }

  function reset() {
    count = 0;
    updateDisplay();
    document.getElementById('history').textContent = 'Reset — start fresh';
  }

  function updateDisplay() {
    document.getElementById('count').textContent = count;
  }

  function triggerPop() {
    const el = document.getElementById('count');
    el.classList.remove('pop');
    void el.offsetWidth; // reflow
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 200);
  }

  function updateHistory() {
    const h = document.getElementById('history');
    if (count === 1) h.textContent = '1 click total';
    else h.textContent = `${count} clicks total`;
  }

  function createRipple(e) {
    const btn = document.getElementById('incrementBtn');
    const ripple = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    ripple.classList.add('ripple');
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }
</script>

</body>
</html>
